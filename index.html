<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holding Page</title>
  <style>
    :root {
      --bg-dark: #05070b;
      --bg-mid: #09131d;
      --cyan: #66e6ff;
      --cyan-soft: rgba(102, 230, 255, 0.18);
      --white-soft: rgba(255,255,255,0.88);
      --panel: rgba(5, 10, 16, 0.78);
      --border: rgba(130, 235, 255, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, rgba(102,230,255,0.16), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(0,160,255,0.12), transparent 28%),
        radial-gradient(circle at 70% 60%, rgba(102,230,255,0.08), transparent 24%),
        linear-gradient(180deg, #020406 0%, #071019 38%, #04070b 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(120,220,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,220,255,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.45));
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode: screen;
      opacity: 0.15;
    }

    .banner {
      width: 100%;
      display: block;
      border-bottom: 1px solid rgba(120,220,255,0.2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: linear-gradient(180deg, rgba(6,14,22,0.9), rgba(4,9,15,0.82));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 20px 50px rgba(0,0,0,0.35), 0 0 40px rgba(102,230,255,0.06);
      backdrop-filter: blur(4px);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .social-tile {
      display: block;
      text-decoration: none;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(102,230,255,0.2);
      background: rgba(255,255,255,0.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 24px rgba(102,230,255,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .social-tile:hover {
      transform: translateY(-4px);
      border-color: rgba(102,230,255,0.45);
      box-shadow: 0 18px 40px rgba(0,0,0,0.38), 0 0 30px rgba(102,230,255,0.16);
    }

    .social-tile img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: rgba(0,0,0,0.2);
    }

    .social-label {
      padding: 14px 16px;
      color: var(--white-soft);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      background: linear-gradient(180deg, rgba(10,20,30,0.65), rgba(5,10,16,0.85));
    }

    @media (max-width: 900px) {
      .social-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .wrap { padding: 28px 16px 56px; }
      .panel { padding: 20px; border-radius: 14px; }
    }
      .panel { padding: 24px; border-radius: 14px; }
      p { line-height: 1.6; }
    }
  </style>
</head>
<body>
  <img class="banner" src="images/banner2.jpg" alt="banner image" />

  <main class="wrap">
    <section class="panel">
      <div class="social-grid">
        <a class="social-tile" href="https://soundcloud.com/mberrysound" target="_blank" rel="noopener noreferrer">
          <img src="images/soundcloud-tile.png" alt="SoundCloud" />
          <div class="social-label">SoundCloud</div>
        </a>

        <a class="social-tile" href="https://www.instagram.com/mberry.sound?utm_source=ig_web_button_share_sheet&amp;igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer">
          <img src="images/instagram-tile.png" alt="Instagram" />
          <div class="social-label">Instagram</div>
        </a>

        <a class="social-tile" href="https://www.facebook.com/mitchell.bezz" target="_blank" rel="noopener noreferrer">
          <img src="images/facebook-tile.png" alt="Facebook" />
          <div class="social-label">Facebook</div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
