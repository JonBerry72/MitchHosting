<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holding Page</title>
  <style>
    :root {
      --bg-dark: #05070b;
      --bg-mid: #09131d;
      --cyan: #66e6ff;
      --cyan-soft: rgba(102, 230, 255, 0.18);
      --white-soft: rgba(255,255,255,0.88);
      --panel: rgba(5, 10, 16, 0.78);
      --border: rgba(130, 235, 255, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, rgba(102,230,255,0.16), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(0,160,255,0.12), transparent 28%),
        radial-gradient(circle at 70% 60%, rgba(102,230,255,0.08), transparent 24%),
        linear-gradient(180deg, #020406 0%, #071019 38%, #04070b 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(120,220,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,220,255,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.45));
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode: screen;
      opacity: 0.15;
    }

    .banner {
      width: 100%;
      display: block;
      border-bottom: 1px solid rgba(120,220,255,0.2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: linear-gradient(180deg, rgba(6,14,22,0.9), rgba(4,9,15,0.82));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 20px 50px rgba(0,0,0,0.35), 0 0 40px rgba(102,230,255,0.06);
      backdrop-filter: blur(4px);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 12px;
      border: 1px solid rgba(102,230,255,0.22);
      border-radius: 999px;
      color: var(--cyan);
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(102,230,255,0.08);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      max-width: 760px;
      color: var(--white-soft);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.7;
    }

    .glow-line {
      width: 160px;
      height: 2px;
      margin: 24px 0 26px;
      background: linear-gradient(90deg, rgba(102,230,255,0.95), rgba(102,230,255,0.1));
      box-shadow: 0 0 18px rgba(102,230,255,0.55);
    }

    .status {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(225,245,255,0.9);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 6px rgba(102,230,255,0.12), 0 0 18px rgba(102,230,255,0.65);
    }

    @media (max-width: 700px) {
      .wrap { padding: 28px 16px 56px; }
      .panel { padding: 24px; border-radius: 14px; }
      p { line-height: 1.6; }
    }
  </style>
</head>
<body>
  <img class="banner" src="images/Banner.jpg" alt="Banner image" />

  <main class="wrap">
    <section class="panel">
      <div class="eyebrow">Holding Page</div>
      <h1>Website Coming Soon</h1>
      <div class="glow-line"></div>
      <p>
        A new site is being prepared.
      </p>
      <div class="status">
        <span class="dot"></span>
        In progress
      </div>
    </section>
  </main>
</body>
</html>
